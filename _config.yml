title: myxik website
description: > # this means to ignore newlines until "baseurl:"
  myxik personal web-site and science-related blog
permalink: ':title/'
baseurl: "/flexible-jekyll" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site, e.g. http://example.com
site-twitter: #if your site has a twitter account, enter it here

# Author Settings
author: Maxim(Max) Mametkulov # add your name
author-img: max.jpeg # add your photo
about-author: Deep and Reinforcement Learning enthusiast <br> Middle CV Engineer @ Halbestunde <br> Research Assistant @ NU # add description
social-github: myxik # add your Github handle
social-telegram: myxik
social-linkedin: maxim-mametkulov# add your Linkedin handle
social-email: myxikpupsik@gmail.com # add your Email address

# Disqus
 # add your discus identifier

# Tracker
analytics: # Google Analytics

# Build Settings
markdown: kramdown
plugins:
  - jekyll-sitemap
  - jekyll-paginate
  - jemoji

paginate: 8
paginate_path: "/page/:num"

exclude: ["node_modules", "gulpfile.js", "package.json", "yarn.lock"]
